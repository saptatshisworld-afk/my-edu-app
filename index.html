<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDUCATO - AI Partner</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <header class="main-header">
            <div class="header-left">
                <h1>EDUCATO</h1>
                <div class="premium-wrapper">
                    <button class="icon-btn arrow-btn" onclick="togglePremiumMenu(event)">
                        <i class="fas fa-chevron-down"></i>
                    </button>
                    <div id="premium-dropdown" class="dropdown-menu">
                        <button class="upgrade-btn">Update to Premium</button>
                    </div>
                </div>
            </div>
            <div class="header-right-group">
                <button class="sign-in-btn" onclick="openAuthModal()">Sign In</button>
                <button class="icon-btn" onclick="toggleHistory()">
                    <i class="fas fa-ellipsis-v"></i>
                </button>
            </div>
        </header>

        <main class="chat-area">
            <div id="result" class="response-display"></div>
        </main>

        <footer class="input-section">
            <div id="plus-menu" class="plus-popup-menu">
                <button onclick="openCamera()"><i class="fas fa-camera"></i> Camera</button>
                <button onclick="openFiles()"><i class="fas fa-folder"></i> Files</button>
                <button onclick="openFiles()"><i class="fas fa-image"></i> Photos</button>
                <button onclick="startStudy()"><i class="fas fa-book-open"></i> Study & Learn</button>
                <button onclick="openFiles()"><i class="fas fa-file-pdf"></i> Upload PDF</button>
                <button onclick="startQuiz()"><i class="fas fa-question-circle"></i> Quizzes</button>
                <button onclick="createImagePrompt()"><i class="fas fa-pencil-alt"></i> Create Image</button>
            </div>

            <div class="orange-input-wrapper">
                <button class="plus-btn" onclick="togglePlusMenu(event)">+</button>
                <textarea id="question" placeholder="Tell me"></textarea>
                <button class="send-btn" onclick="askQuestion()">
                    <i class="fas fa-arrow-up"></i>
                    <div class="spinner"></div>
                </button>
            </div>
            <p class="branding">Powered by : TEAM SMGS</p>
        </footer>

        <div id="history-sidebar" class="sidebar">
            <div class="sidebar-header">
                <h3>Recent History</h3>
                <button onclick="toggleHistory()">×</button>
            </div>
            <div id="historyList"></div>
        </div>

        <div id="auth-modal" class="modal-overlay">
            <div class="modal-content">
                <span class="close-modal" onclick="closeAuthModal()">&times;</span>
                <h2 id="modal-title">Welcome Back</h2>
                <p id="modal-subtitle">Sign in to save your study history.</p>
                <form id="auth-form" onsubmit="handleAuth(event)">
                    <input type="email" id="auth-email" placeholder="Email Address" required>
                    <input type="password" id="auth-password" placeholder="Password" required>
                    <button type="submit" class="auth-submit-btn">Continue</button>
                </form>
                <p class="auth-toggle">Don't have an account? <a href="#" onclick="toggleAuthMode()">Sign Up</a></p>
            </div>
        </div>
    </div>
    <input type="file" id="pdf-input" style="display:none;">
    <script src="script.js"></script>
</body>
</html>
