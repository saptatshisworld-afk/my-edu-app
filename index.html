<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDUCATO - AI Partner</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <header class="main-header">
            <div class="header-left">
                <h1>EDUCATO</h1>
                <button class="icon-btn arrow-btn" onclick="togglePremiumMenu()">
                    <i class="fas fa-chevron-down"></i>
                </button>
            </div>
            <button class="icon-btn dots-btn" onclick="toggleHistory()">
                <i class="fas fa-ellipsis-v"></i>
            </button>
        </header>

        <div id="premium-dropdown" class="dropdown-menu">
            <button class="upgrade-btn">Update to Premium</button>
        </div>

        <main class="chat-area">
            <div id="result" class="response-display"></div>
            <div class="input-section">
                <div class="orange-input-wrapper">
                    <button class="plus-btn" onclick="openPdfUpload()">+</button>
                    <textarea id="question" placeholder="Tell me"></textarea>
                    <button class="send-btn" onclick="askQuestion()">
                        <i class="fas fa-arrow-up"></i>
                    </button>
                </div>
                <p class="branding">Powered by : TEAM SMGS</p>
            </div>
        </main>

        <div id="history-sidebar" class="sidebar">
            <div class="sidebar-header">
                <h3>Recent History</h3>
                <div class="header-actions">
                    <button onclick="clearChat()" class="clear-btn">Clear</button>
                    <button onclick="toggleHistory()" class="close-btn">&times;</button>
                </div>
            </div>
            <div id="historyList">Loading history...</div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
