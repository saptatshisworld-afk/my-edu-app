<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDUCATO - AI Partner</title>
    <!-- Icons Library: Fixes the empty boxes in the UI -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Main Stylesheet: Fixes the layout issue -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo-container">
            <h1 class="logo">EDUCATO</h1>
            <div class="dropdown">
                <button class="dropbtn"><i class="fas fa-chevron-down"></i></button>
            </div>
        </div>
        <div class="auth-buttons">
            <button class="sign-in-btn" onclick="openAuthModal()">Sign In</button>
        </div>
    </header>

    <main>
        <div id="chat-container">
            <!-- Messages appear here -->
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <button class="plus-btn" onclick="togglePlusMenu(event)">
                    <i class="fas fa-plus"></i>
                </button>
                <input type="text" id="user-input" placeholder="Tell me" onkeypress="handleKeyPress(event)">
                <button class="send-btn" onclick="askQuestion()">
                    <i class="fas fa-arrow-up"></i>
                </button>
            </div>
        </div>
    </main>

    <!-- Firebase Auth Modal -->
    <div id="auth-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeAuthModal()">&times;</span>
            <h2 id="modal-title">Sign In</h2>
            <input type="email" id="auth-email" placeholder="Email">
            <input type="password" id="auth-password" placeholder="Password (min. 6 characters)">
            <button id="auth-submit-btn" onclick="handleAuth()">Submit</button>
            <p id="auth-toggle-text">Don't have an account? <span onclick="toggleAuthMode()" style="color: blue; cursor: pointer;">Sign Up</span></p>
        </div>
    </div>

    <!-- Loading script as a module -->
    <script type="module" src="script.js"></script>
</body>
</html>
